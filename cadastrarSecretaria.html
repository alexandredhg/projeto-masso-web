<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Página de Cadastrar Secretária</title>
        <link rel="stylesheet" href="css/cadastrarSecretaria.css" />
    </head>    
    <body>

        <div class="container-switch">
            <label class="switch" for="theme-toggle">
                <span id="switch-label">Modo Escuro</span>
                <input type="checkbox" id="theme-toggle" role="switch" aria-labelledby="switch-label"
                    aria-checked="false">
                <span class="slider"></span>
            </label>
        </div>
        
        <main>

            <div class="containerTitulos">
                <h1>Cadastro de Secretáeia</h1>
                
                <h2>Ambulatório de  Massoterapia</h2>
            </div>           
            
            <h4>Formulário de Cadastro de Novas Secretária:</h4>
            
            <form id="formCadastrarTerapeuta"  class="form">
                        
                <div>
                    <label form="txtNome">* Nome :</label>
                    <input type="text" id="txtNome" required />                
                </div>
                
                <div>
                    <label form="txtNome">* Sobrenome :</label>
                    <input type="text" id="txtNome" required />                
                </div>
                
                <div>
                    <label form="txtCpf">* CPF:</label>
                    <input type="CPF" id="txtCpf" required />
                </div>
                
                <div>
                    <label for="txtDataNascimento">* Data de Nascimento:</label>
                    <input type="date" id="txtDataNascimento" required>
                </div>
                
                <div>
                    <label form="txtEmail">* E-mail:</label>
                    <input type="email" id="txtEmail" required />
                </div>
                        
                <div>
                    <label for="txtSenha">* Senha: </label>                
                    <input type="password" id="txtSenha" />                
                </div>
                
                <div>
                    <label for="txtConfSenha">* Confirmar Senha: </label>                
                    <input type="password" id="txtConfSenha" />                
                </div> 
                        
                <div>
                    <label for="txtTelefone 1">* Telefone 1:</label>
                    <input type="tel" id="txtTelefone" required>    
                </div>
                
                <div>
                    <label for="txtTelefone 2">* Telefone 2:</label>
                    <input type="tel" id="txtTelefone" required>
                </div>
                    
                <div>
                    <label for="slGenero">* Gênero</label>
                    <select id="slGenero">
                    <option value="">Selecione...</option>
                    <option value="F">Feminino</option>
                    <option value="M">Masculino</option>
                    <option value="N">Prefiro não Informar</option>
                    </select>
                </div>
                
                <div>
                    <label for="txEndereco">* Endereço:</label>
                    <input type="endereco" id="txEndereco" required />
                </div>
                        
                <div>
                    <label for="txtComplemento">* Complemento:</label>
                    <input type="complemento" id="txtComplemento"required />
                </div>
                
                <div>
                    <label for="txtBairro">* Bairro:</label>
                    <input type="bairro" id="txtBairro" required />
                </div>
                
                <div>
                    <label for="txtUf">* Uf:</label>
                    <input type="uf" id="txtUf" required />
                </div>
                
                <div>
                    <label for="txtCidade">* Cidade:</label>
                    <input type="cidade" id="txtCidade" required />
                </div>
                
                <div>
                    <label for="txtCep">* Cep:</label>
                    <input type="cep" id="txtCep" required />
                </div>
                

                <div class="containerButton">
                <button class="button" type="submit" id="btnSubmit">Cadastrar</button>
                </div> 

            </form>
            
            <div id="divMensagem" role="alert" aria-live="assertive"></div>        
            
            <div class="containerVoltar">
                <a class="voltar" href="areaRestritaCoordenacao.html">Voltar</a>
            </div>

            <button class="btnVoltarTopo" id="btnVoltarTopo"  aria-label="Voltar Para o Topo"  title="Voltar para o topo">
                    Topo
            </button>

        </main>
        
        <!--Script-->
        <script defer type="module" src="dist/cadastrarSecretaria.js"></script>

        <script defer type="module" src="dist/voltarTopo.js"></script>

        <script defer type="module" src="dist/modoEscuro.js"></script>
    </body>

   
</html>
